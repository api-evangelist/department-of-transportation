name: Department of Transportation API Capabilities
description: >-
  High-level capabilities published by DOT operating administrations - NHTSA,
  FMCSA, FAA, FRA, FTA, MARAD, PHMSA, and BTS.
capabilities:
  - id: vin-decode
    name: Decode a Vehicle by VIN
    description: Convert a VIN into structured make, model, year, body class, engine, and equipment data.
    apis:
      - nhtsa-vpic-api
    auth: None (public)
  - id: vehicle-catalog
    name: Browse Makes, Models, and Manufacturers
    description: Look up the universe of vehicle makes, models, and manufacturers tracked by NHTSA.
    apis:
      - nhtsa-vpic-api
    auth: None (public)
  - id: vehicle-safety
    name: Vehicle Safety Recalls and Complaints
    description: Search NHTSA recalls, consumer complaints, defect investigations, and 5-Star Safety Ratings.
    apis:
      - nhtsa-recalls-api
    auth: None (public)
  - id: motor-carrier-lookup
    name: Look Up a Motor Carrier
    description: Retrieve registration, operating authority, inspection, and crash records for a USDOT-registered carrier.
    apis:
      - fmcsa-qcmobile-api
    auth: API key (webKey)
  - id: airport-status
    name: Real-Time Airport Status
    description: Read current status, delays, weather, and ground stops for major U.S. airports.
    apis:
      - faa-airport-status-api
    auth: None (public)
  - id: transportation-statistics
    name: Federal Transportation Statistics
    description: Access BTS datasets on freight, passenger, transit, and infrastructure performance.
    apis: []
    auth: None (public)
