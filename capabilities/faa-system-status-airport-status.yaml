naftiko: 1.0.0-alpha2
info:
  label: FAA Airport Status API — Airport Status
  description: 'FAA Airport Status API — Airport Status. 1 operations. Lead operation: Get current status for an airport.
    Self-contained Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - Airport Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: faa-system-status-airport-status
    baseUri: https://soa.smext.faa.gov/asws/api/airport/status
    description: FAA Airport Status API — Airport Status business capability. Self-contained, no shared references.
    resources:
    - name: airportCode
      path: /{airportCode}
      operations:
      - name: getairportstatus
        method: GET
        description: Get current status for an airport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: airportCode
          in: path
          type: string
          description: IATA or ICAO airport code (e.g. JFK, KJFK)
          required: true
  exposes:
  - type: rest
    namespace: faa-system-status-airport-status-rest
    port: 8080
    description: REST adapter for FAA Airport Status API — Airport Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{airportcode}
      name: airportcode
      description: REST surface for airportCode.
      operations:
      - method: GET
        name: getairportstatus
        description: Get current status for an airport
        call: faa-system-status-airport-status.getairportstatus
        with:
          airportCode: rest.airportCode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: faa-system-status-airport-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for FAA Airport Status API — Airport Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-current-status-airport
      description: Get current status for an airport
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: faa-system-status-airport-status.getairportstatus
      with:
        airportCode: tools.airportCode
      outputParameters:
      - type: object
        mapping: $.
