naftiko: 1.0.0-alpha2
info:
  label: FMCSA QCMobile API — Authority
  description: 'FMCSA QCMobile API — Authority. 2 operations. Lead operation: Look up a carrier by MC/MX docket number. Self-contained
    Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - Authority
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: fmcsa-qcmobile-authority
    baseUri: https://mobile.fmcsa.dot.gov/qc/services
    description: FMCSA QCMobile API — Authority business capability. Self-contained, no shared references.
    resources:
    - name: carriers-docket-number-docketNumber
      path: /carriers/docket-number/{docketNumber}
      operations:
      - name: getcarrierbydocket
        method: GET
        description: Look up a carrier by MC/MX docket number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: docketNumber
          in: path
          type: string
          required: true
    - name: carriers-dotNumber-authority
      path: /carriers/{dotNumber}/authority
      operations:
      - name: getauthority
        method: GET
        description: Operating authority for a carrier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dotNumber
          in: path
          type: integer
          required: true
    authentication:
      type: apikey
      key: webKey
      value: '{{env.DEPARTMENT_OF_TRANSPORTATION_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: fmcsa-qcmobile-authority-rest
    port: 8080
    description: REST adapter for FMCSA QCMobile API — Authority. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/carriers/docket-number/{docketnumber}
      name: carriers-docket-number-docketnumber
      description: REST surface for carriers-docket-number-docketNumber.
      operations:
      - method: GET
        name: getcarrierbydocket
        description: Look up a carrier by MC/MX docket number
        call: fmcsa-qcmobile-authority.getcarrierbydocket
        with:
          docketNumber: rest.docketNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/carriers/{dotnumber}/authority
      name: carriers-dotnumber-authority
      description: REST surface for carriers-dotNumber-authority.
      operations:
      - method: GET
        name: getauthority
        description: Operating authority for a carrier
        call: fmcsa-qcmobile-authority.getauthority
        with:
          dotNumber: rest.dotNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fmcsa-qcmobile-authority-mcp
    port: 9090
    transport: http
    description: MCP adapter for FMCSA QCMobile API — Authority. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: look-up-carrier-mc-mx
      description: Look up a carrier by MC/MX docket number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fmcsa-qcmobile-authority.getcarrierbydocket
      with:
        docketNumber: tools.docketNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: operating-authority-carrier
      description: Operating authority for a carrier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fmcsa-qcmobile-authority.getauthority
      with:
        dotNumber: tools.dotNumber
      outputParameters:
      - type: object
        mapping: $.
