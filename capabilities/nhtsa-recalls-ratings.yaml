naftiko: 1.0.0-alpha2
info:
  label: NHTSA Vehicle Safety API — Ratings
  description: 'NHTSA Vehicle Safety API — Ratings. 1 operations. Lead operation: 5-Star Safety Ratings for a vehicle. Self-contained
    Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - Ratings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: nhtsa-recalls-ratings
    baseUri: https://api.nhtsa.gov
    description: NHTSA Vehicle Safety API — Ratings business capability. Self-contained, no shared references.
    resources:
    - name: SafetyRatings-modelyear-modelYear-make-make-model-model
      path: /SafetyRatings/modelyear/{modelYear}/make/{make}/model/{model}
      operations:
      - name: getsafetyratings
        method: GET
        description: 5-Star Safety Ratings for a vehicle
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: modelYear
          in: path
          type: integer
          required: true
        - name: make
          in: path
          type: string
          required: true
        - name: model
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: nhtsa-recalls-ratings-rest
    port: 8080
    description: REST adapter for NHTSA Vehicle Safety API — Ratings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/safetyratings/modelyear/{modelyear}/make/{make}/model/{model}
      name: safetyratings-modelyear-modelyear-make-make-model-model
      description: REST surface for SafetyRatings-modelyear-modelYear-make-make-model-model.
      operations:
      - method: GET
        name: getsafetyratings
        description: 5-Star Safety Ratings for a vehicle
        call: nhtsa-recalls-ratings.getsafetyratings
        with:
          modelYear: rest.modelYear
          make: rest.make
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nhtsa-recalls-ratings-mcp
    port: 9090
    transport: http
    description: MCP adapter for NHTSA Vehicle Safety API — Ratings. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: 5-star-safety-ratings-vehicle
      description: 5-Star Safety Ratings for a vehicle
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-recalls-ratings.getsafetyratings
      with:
        modelYear: tools.modelYear
        make: tools.make
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
