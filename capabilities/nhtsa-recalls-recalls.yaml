naftiko: 1.0.0-alpha2
info:
  label: NHTSA Vehicle Safety API — Recalls
  description: 'NHTSA Vehicle Safety API — Recalls. 2 operations. Lead operation: Look up a recall by NHTSA campaign number.
    Self-contained Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - Recalls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: nhtsa-recalls-recalls
    baseUri: https://api.nhtsa.gov
    description: NHTSA Vehicle Safety API — Recalls business capability. Self-contained, no shared references.
    resources:
    - name: recalls-campaignNumber
      path: /recalls/campaignNumber
      operations:
      - name: getrecallbycampaign
        method: GET
        description: Look up a recall by NHTSA campaign number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaignNumber
          in: query
          type: string
          required: true
    - name: recalls-recallsByVehicle
      path: /recalls/recallsByVehicle
      operations:
      - name: getrecallsbyvehicle
        method: GET
        description: Look up recalls by make, model, and model year
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: make
          in: query
          type: string
          required: true
        - name: model
          in: query
          type: string
          required: true
        - name: modelYear
          in: query
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: nhtsa-recalls-recalls-rest
    port: 8080
    description: REST adapter for NHTSA Vehicle Safety API — Recalls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/recalls/campaignnumber
      name: recalls-campaignnumber
      description: REST surface for recalls-campaignNumber.
      operations:
      - method: GET
        name: getrecallbycampaign
        description: Look up a recall by NHTSA campaign number
        call: nhtsa-recalls-recalls.getrecallbycampaign
        with:
          campaignNumber: rest.campaignNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recalls/recallsbyvehicle
      name: recalls-recallsbyvehicle
      description: REST surface for recalls-recallsByVehicle.
      operations:
      - method: GET
        name: getrecallsbyvehicle
        description: Look up recalls by make, model, and model year
        call: nhtsa-recalls-recalls.getrecallsbyvehicle
        with:
          make: rest.make
          model: rest.model
          modelYear: rest.modelYear
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nhtsa-recalls-recalls-mcp
    port: 9090
    transport: http
    description: MCP adapter for NHTSA Vehicle Safety API — Recalls. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: look-up-recall-nhtsa-campaign
      description: Look up a recall by NHTSA campaign number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-recalls-recalls.getrecallbycampaign
      with:
        campaignNumber: tools.campaignNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: look-up-recalls-make-model
      description: Look up recalls by make, model, and model year
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-recalls-recalls.getrecallsbyvehicle
      with:
        make: tools.make
        model: tools.model
        modelYear: tools.modelYear
      outputParameters:
      - type: object
        mapping: $.
