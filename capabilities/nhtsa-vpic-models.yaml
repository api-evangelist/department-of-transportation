naftiko: 1.0.0-alpha2
info:
  label: NHTSA vPIC (Vehicle Product Information Catalog) API — Models
  description: 'NHTSA vPIC (Vehicle Product Information Catalog) API — Models. 2 operations. Lead operation: Get models for
    a make. Self-contained Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: nhtsa-vpic-models
    baseUri: https://vpic.nhtsa.dot.gov/api
    description: NHTSA vPIC (Vehicle Product Information Catalog) API — Models business capability. Self-contained, no shared
      references.
    resources:
    - name: vehicles-GetModelsForMake-makeName
      path: /vehicles/GetModelsForMake/{makeName}
      operations:
      - name: getmodelsformake
        method: GET
        description: Get models for a make
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: makeName
          in: path
          type: string
          required: true
    - name: vehicles-GetModelsForMakeYear-make-make-modelyear-year
      path: /vehicles/GetModelsForMakeYear/make/{make}/modelyear/{year}
      operations:
      - name: getmodelsformakeyear
        method: GET
        description: Get models for a make in a given model year
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: make
          in: path
          type: string
          required: true
        - name: year
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: nhtsa-vpic-models-rest
    port: 8080
    description: REST adapter for NHTSA vPIC (Vehicle Product Information Catalog) API — Models. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vehicles/getmodelsformake/{makename}
      name: vehicles-getmodelsformake-makename
      description: REST surface for vehicles-GetModelsForMake-makeName.
      operations:
      - method: GET
        name: getmodelsformake
        description: Get models for a make
        call: nhtsa-vpic-models.getmodelsformake
        with:
          makeName: rest.makeName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/getmodelsformakeyear/make/{make}/modelyear/{year}
      name: vehicles-getmodelsformakeyear-make-make-modelyear-year
      description: REST surface for vehicles-GetModelsForMakeYear-make-make-modelyear-year.
      operations:
      - method: GET
        name: getmodelsformakeyear
        description: Get models for a make in a given model year
        call: nhtsa-vpic-models.getmodelsformakeyear
        with:
          make: rest.make
          year: rest.year
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nhtsa-vpic-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for NHTSA vPIC (Vehicle Product Information Catalog) API — Models. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-models-make
      description: Get models for a make
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-vpic-models.getmodelsformake
      with:
        makeName: tools.makeName
      outputParameters:
      - type: object
        mapping: $.
    - name: get-models-make-given-model
      description: Get models for a make in a given model year
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-vpic-models.getmodelsformakeyear
      with:
        make: tools.make
        year: tools.year
      outputParameters:
      - type: object
        mapping: $.
