naftiko: 1.0.0-alpha2
info:
  label: NHTSA vPIC (Vehicle Product Information Catalog) API — WMI
  description: 'NHTSA vPIC (Vehicle Product Information Catalog) API — WMI. 1 operations. Lead operation: Decode a World Manufacturer
    Identifier. Self-contained Naftiko capability covering one Department Of Transportation business surface.'
  tags:
  - Department Of Transportation
  - WMI
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEPARTMENT_OF_TRANSPORTATION_API_KEY: DEPARTMENT_OF_TRANSPORTATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: nhtsa-vpic-wmi
    baseUri: https://vpic.nhtsa.dot.gov/api
    description: NHTSA vPIC (Vehicle Product Information Catalog) API — WMI business capability. Self-contained, no shared
      references.
    resources:
    - name: vehicles-DecodeWMI-wmi
      path: /vehicles/DecodeWMI/{wmi}
      operations:
      - name: decodewmi
        method: GET
        description: Decode a World Manufacturer Identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: wmi
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: nhtsa-vpic-wmi-rest
    port: 8080
    description: REST adapter for NHTSA vPIC (Vehicle Product Information Catalog) API — WMI. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vehicles/decodewmi/{wmi}
      name: vehicles-decodewmi-wmi
      description: REST surface for vehicles-DecodeWMI-wmi.
      operations:
      - method: GET
        name: decodewmi
        description: Decode a World Manufacturer Identifier
        call: nhtsa-vpic-wmi.decodewmi
        with:
          wmi: rest.wmi
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nhtsa-vpic-wmi-mcp
    port: 9090
    transport: http
    description: MCP adapter for NHTSA vPIC (Vehicle Product Information Catalog) API — WMI. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: decode-world-manufacturer-identifier
      description: Decode a World Manufacturer Identifier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nhtsa-vpic-wmi.decodewmi
      with:
        wmi: tools.wmi
      outputParameters:
      - type: object
        mapping: $.
